<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="BODY LOG">
<title>BODY LOG</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f3ee; --card: #fff; --ink: #1a1208; --muted: #9a8e80;
    --accent: #c84b2f; --accent-light: #f0d5cf;
    --green: #2e7d5e; --green-light: #d4ede5; --border: #e8e0d5;
  }
  body { background: var(--bg); color: var(--ink); font-family: 'Noto Serif JP', serif; min-height: 100vh; }
  #app { max-width: 480px; margin: 0 auto; padding: 24px 16px 60px; }

  /* 初期設定画面 */
  .setup-screen { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 32px 16px; max-width: 480px; margin: 0 auto; }
  .setup-title { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 28px; letter-spacing: 3px; color: var(--accent); margin-bottom: 8px; }
  .setup-sub { font-size: 13px; color: var(--muted); margin-bottom: 40px; line-height: 1.6; }
  .setup-field { margin-bottom: 24px; }
  .setup-label { font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; display: block; }
  .setup-input { width: 100%; background: var(--card); border: 1.5px solid var(--border); border-radius: 6px; padding: 12px 16px; font-size: 20px; font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--ink); -webkit-appearance: none; }
  .setup-input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .setup-input-sm { font-size: 15px; font-family: 'Noto Serif JP', serif; font-weight: 400; }
  .setup-note { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .setup-btn { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 16px 0; font-size: 15px; font-family: 'Noto Serif JP', serif; font-weight: 700; cursor: pointer; margin-top: 8px; letter-spacing: 1px; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
  .app-name { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 22px; letter-spacing: 3px; color: var(--accent); }
  .date-str { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .streak-badge { background: var(--accent-light); border: 1px solid var(--accent); border-radius: 6px; padding: 6px 12px; text-align: center; }
  .streak-num { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 22px; color: var(--accent); display: block; line-height: 1; }
  .streak-lbl { font-size: 10px; color: var(--accent); letter-spacing: 1px; }

  /* Goal card */
  .goal-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 16px; position: relative; }
  .goal-edit-btn { position: absolute; top: 10px; right: 12px; background: none; border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; font-size: 10px; color: var(--muted); cursor: pointer; font-family: inherit; }
  .goal-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; }
  .lbl { font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-bottom: 2px; }
  .goal-val { font-weight: 700; font-size: 20px; }
  .goal-date-lbl { font-size: 12px; color: var(--muted); font-weight: 400; margin-left: 4px; }
  .days-num { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 26px; color: var(--green); }
  .days-unit { font-size: 13px; font-weight: 400; }
  .ideal-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; font-size: 13px; }
  .ideal-val { color: var(--green); font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .diff-row { font-size: 13px; margin-top: 4px; }

  /* Tabs */
  .tabs { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; margin-bottom: 16px; }
  .tab { flex: 1; background: var(--card); border: none; padding: 10px 0; font-size: 13px; font-family: 'Noto Serif JP', serif; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .tab.active { background: var(--ink); color: var(--bg); font-weight: 700; }

  .cal-card { text-align: center; padding: 12px 0 8px; margin-bottom: 8px; }
  .cal-num { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 52px; color: var(--accent); letter-spacing: -2px; line-height: 1; }
  .cal-unit { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .section { margin-bottom: 20px; }
  .sec-title { font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }

  .meal-entry { margin-bottom: 12px; }
  .meal-label-txt { font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-bottom: 4px; }
  .input-row { display: flex; gap: 8px; }
  .text-input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 9px 12px; font-size: 13px; font-family: 'Noto Serif JP', serif; color: var(--ink); -webkit-appearance: none; }
  .text-input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .add-btn { background: var(--ink); color: var(--bg); border: none; border-radius: 4px; padding: 9px 14px; font-size: 12px; font-family: 'Noto Serif JP', serif; font-weight: 700; cursor: pointer; white-space: nowrap; }

  .meal-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 8px; animation: fadeIn 0.3s ease; }
  .meal-row-l { flex: 1; }
  .meal-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .meal-tag { font-size: 10px; background: var(--accent-light); color: var(--accent); padding: 1px 6px; border-radius: 2px; font-weight: 700; }
  .meal-time { font-size: 10px; color: var(--muted); }
  .meal-txt { font-size: 13px; color: var(--ink); margin-bottom: 4px; }
  .unknown-note { font-size: 10px; color: var(--muted); margin-bottom: 4px; font-style: italic; }
  .meal-chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .meal-chip { font-size: 10px; background: var(--border); color: var(--muted); padding: 2px 6px; border-radius: 10px; }
  .meal-row-r { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
  .meal-cal { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 18px; color: var(--accent); line-height: 1; }
  .meal-cal-unit { font-size: 10px; color: var(--muted); }
  .del-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 11px; padding: 2px; }

  .w-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .w-input { width: 90px; background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 9px 12px; font-size: 18px; font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--ink); -webkit-appearance: none; }
  .w-unit { font-size: 13px; color: var(--muted); }
  .weight-logged { font-size: 12px; color: var(--green); margin-top: 4px; animation: fadeIn 0.3s ease; }

  .advice-box { background: var(--green-light); border: 1px solid var(--green); border-radius: 8px; padding: 14px 16px; margin-bottom: 16px; animation: fadeIn 0.3s ease; }
  .advice-title { font-size: 11px; letter-spacing: 2px; color: var(--green); text-transform: uppercase; margin-bottom: 8px; }
  .advice-txt { font-size: 14px; line-height: 1.8; color: var(--ink); }

  .graph-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px 12px; margin-bottom: 16px; }
  .no-data { text-align: center; color: var(--muted); font-size: 13px; line-height: 1.8; padding: 30px 0; }
  .hist-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .hist-date { color: var(--muted); font-size: 11px; font-family: 'JetBrains Mono', monospace; }
  .hist-w { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--ink); }

  .tab-content { display: none; }
  .tab-content.active { display: block; animation: fadeIn 0.3s ease; }

  /* モーダル */
  .modal-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 24px; }
  .modal { background: var(--bg); border-radius: 12px; padding: 28px 24px; width: 100%; max-width: 400px; animation: fadeIn 0.2s ease; }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
  .modal-btn-row { display: flex; gap: 10px; margin-top: 20px; }
  .modal-cancel { flex: 1; background: var(--border); color: var(--ink); border: none; border-radius: 6px; padding: 12px 0; font-size: 13px; font-family: inherit; cursor: pointer; }
  .modal-save { flex: 2; background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 12px 0; font-size: 13px; font-family: inherit; font-weight: 700; cursor: pointer; }

  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>

<!-- 初期設定画面 -->
<div id="setupScreen" style="display:none">
  <div class="setup-screen">
    <div class="setup-title">BODY LOG</div>
    <div class="setup-sub">毎日の食事と体重を記録して、<br>目標体重を達成しましょう。<br>まず目標を設定してください。</div>
    <div class="setup-field">
      <span class="setup-label">あなたの名前</span>
      <input class="setup-input setup-input-sm" type="text" id="setupName" placeholder="例：原さん">
    </div>
    <div class="setup-field">
      <span class="setup-label">現在の体重 (kg)</span>
      <input class="setup-input" type="number" id="setupCurrentWeight" placeholder="65.0" step="0.1" inputmode="decimal">
    </div>
    <div class="setup-field">
      <span class="setup-label">目標体重 (kg)</span>
      <input class="setup-input" type="number" id="setupGoalWeight" placeholder="58.0" step="0.1" inputmode="decimal">
    </div>
    <div class="setup-field">
      <span class="setup-label">達成したい日</span>
      <input class="setup-input setup-input-sm" type="date" id="setupGoalDate">
      <div class="setup-note">この日までに目標体重を達成します</div>
    </div>
    <button class="setup-btn" onclick="saveSetup()">はじめる →</button>
  </div>
</div>

<!-- メイン画面 -->
<div id="mainScreen" style="display:none">
<div id="app">
  <div class="header">
    <div>
      <div class="app-name">BODY LOG</div>
      <div class="date-str" id="dateStr"></div>
    </div>
    <div class="streak-badge">
      <span class="streak-num" id="streakNum">0</span>
      <span class="streak-lbl">日連続</span>
    </div>
  </div>

  <div class="goal-card">
    <button class="goal-edit-btn" onclick="openGoalEdit()">目標を変更</button>
    <div class="goal-row">
      <div>
        <div class="lbl">目標</div>
        <div class="goal-val" id="goalVal">-</div>
      </div>
      <div style="text-align:right">
        <div class="lbl">残り</div>
        <div class="days-num" id="daysLeft">-<span class="days-unit">日</span></div>
      </div>
    </div>
    <div class="ideal-row">
      <span class="lbl">今日の理想体重</span>
      <span class="ideal-val" id="idealWeight">-</span>
    </div>
    <div class="diff-row" id="weightDiff" style="display:none"></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('today')">今日の記録</button>
    <button class="tab" onclick="switchTab('graph')">グラフ</button>
  </div>

  <div id="tab-today" class="tab-content active">
    <div class="cal-card">
      <div class="cal-num" id="totalCal">0</div>
      <div class="cal-unit">kcal　今日の合計</div>
    </div>
    <div class="section">
      <div class="sec-title">食事を記録する</div>
      <div id="mealInputs"></div>
    </div>
    <div class="section" id="mealListSection" style="display:none">
      <div class="sec-title">今日の食事</div>
      <div id="mealList"></div>
    </div>
    <div class="section">
      <div class="sec-title">今日の体重</div>
      <div class="w-row">
        <input class="w-input" type="number" id="weightInput" step="0.1" placeholder="64.3" inputmode="decimal">
        <span class="w-unit">kg</span>
        <button class="add-btn" onclick="logWeight()">記録</button>
      </div>
      <div class="weight-logged" id="weightLogged" style="display:none"></div>
    </div>
    <div id="adviceBox" style="display:none" class="advice-box">
      <div class="advice-title">今日のアドバイス</div>
      <div class="advice-txt" id="adviceTxt"></div>
    </div>
  </div>

  <div id="tab-graph" class="tab-content">
    <div class="graph-card">
      <div class="sec-title">体重推移 vs 目標ライン</div>
      <div id="noData" class="no-data">まだ体重データがありません。<br>毎日記録するとグラフが表示されます。</div>
      <canvas id="weightChart" style="display:none"></canvas>
    </div>
    <div class="section">
      <div class="sec-title">記録一覧（直近14日）</div>
      <div id="histList"></div>
    </div>
  </div>
</div>
</div>

<!-- 目標変更モーダル -->
<div id="goalModal" class="modal-overlay" style="display:none" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title">目標を変更する</div>
    <div class="setup-field">
      <span class="setup-label">目標体重 (kg)</span>
      <input class="setup-input" type="number" id="editGoalWeight" step="0.1" inputmode="decimal">
    </div>
    <div class="setup-field">
      <span class="setup-label">達成したい日</span>
      <input class="setup-input setup-input-sm" type="date" id="editGoalDate">
    </div>
    <div class="modal-btn-row">
      <button class="modal-cancel" onclick="document.getElementById('goalModal').style.display='none'">キャンセル</button>
      <button class="modal-save" onclick="saveGoalEdit()">保存する</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = "healthlog_v2";
const GOAL_KEY = "healthlog_goal";
const MEAL_LABELS = ["朝食","昼食","夕食","間食"];

const FOOD_DB = [
  {keys:["ご飯","ごはん","白米"],cal:252},{keys:["ご飯大盛り","大盛りご飯"],cal:378},
  {keys:["ご飯少なめ","ごはん少なめ"],cal:180},{keys:["おにぎり","おむすび"],cal:170},
  {keys:["食パン","トースト","パン"],cal:158},{keys:["クロワッサン"],cal:210},
  {keys:["うどん"],cal:270},{keys:["そば","蕎麦"],cal:260},
  {keys:["ラーメン","らーめん"],cal:480},{keys:["パスタ","スパゲッティ"],cal:380},
  {keys:["チャーハン","焼き飯"],cal:620},{keys:["カレーライス","カレー"],cal:720},
  {keys:["オムライス"],cal:650},{keys:["親子丼"],cal:580},
  {keys:["牛丼大盛り"],cal:820},{keys:["牛丼"],cal:637},
  {keys:["天丼"],cal:730},{keys:["刺身定食","さしみ定食"],cal:500},
  {keys:["焼き魚定食","焼魚定食"],cal:520},{keys:["焼肉定食"],cal:750},
  {keys:["ハンバーグ定食"],cal:680},{keys:["唐揚げ定食","からあげ定食"],cal:750},
  {keys:["豚骨ラーメン"],cal:550},{keys:["味噌ラーメン"],cal:510},
  {keys:["醤油ラーメン"],cal:470},{keys:["つけ麺"],cal:580},
  {keys:["焼きそば"],cal:450},{keys:["そうめん","素麺"],cal:220},
  {keys:["唐揚げ","からあげ"],cal:220},{keys:["焼き鳥","やきとり"],cal:130},
  {keys:["ステーキ"],cal:400},{keys:["トンカツ","豚カツ"],cal:380},
  {keys:["ハンバーグ"],cal:280},{keys:["餃子","ぎょうざ"],cal:200},
  {keys:["焼き魚","焼魚","鮭","さけ"],cal:170},{keys:["刺身","さしみ"],cal:150},
  {keys:["エビフライ"],cal:180},{keys:["天ぷら","てんぷら"],cal:300},
  {keys:["しゃぶしゃぶ"],cal:400},{keys:["すき焼き"],cal:520},
  {keys:["目玉焼き"],cal:90},{keys:["ゆで卵","茹で卵"],cal:78},
  {keys:["卵","たまご","玉子"],cal:78},{keys:["スクランブルエッグ"],cal:140},
  {keys:["豆腐","冷奴","湯豆腐"],cal:80},{keys:["納豆","なっとう"],cal:100},
  {keys:["味噌汁","みそ汁","みそしる"],cal:35},{keys:["サラダ","グリーンサラダ"],cal:30},
  {keys:["シーザーサラダ"],cal:180},{keys:["ポテトサラダ"],cal:160},
  {keys:["野菜炒め","やさい炒め"],cal:150},{keys:["枝豆","えだまめ"],cal:100},
  {keys:["ビッグマック"],cal:525},{keys:["チーズバーガー"],cal:330},
  {keys:["ハンバーガー","バーガー"],cal:290},{keys:["フライドポテト","ポテト"],cal:240},
  {keys:["ピザ"],cal:260},{keys:["たこ焼き","タコ焼き"],cal:300},
  {keys:["お好み焼き"],cal:380},{keys:["牛乳","ミルク"],cal:130},
  {keys:["ヨーグルト"],cal:60},{keys:["チーズ"],cal:100},
  {keys:["バナナ"],cal:86},{keys:["りんご","リンゴ"],cal:84},
  {keys:["みかん","オレンジ"],cal:45},{keys:["いちご","苺"],cal:30},
  {keys:["スイカ","すいか"],cal:80},{keys:["桃","もも"],cal:65},
  {keys:["チョコレート","チョコ"],cal:150},{keys:["ポテトチップス","ポテチ"],cal:350},
  {keys:["クッキー"],cal:80},{keys:["ショートケーキ","ケーキ"],cal:320},
  {keys:["アイスクリーム","アイス"],cal:180},{keys:["プリン"],cal:130},
  {keys:["大福","だいふく"],cal:120},{keys:["どら焼き"],cal:180},
  {keys:["せんべい","煎餅"],cal:100},{keys:["カフェラテ","ラテ"],cal:120},
  {keys:["コーヒー","珈琲"],cal:5},{keys:["緑茶","お茶","日本茶"],cal:2},
  {keys:["コーラ","ジュース","サイダー"],cal:140},{keys:["オレンジジュース","野菜ジュース"],cal:110},
  {keys:["プロテイン"],cal:120},{keys:["サンドイッチ"],cal:280},
  {keys:["おでん"],cal:150},{keys:["肉まん"],cal:200},
  {keys:["あんまん"],cal:220},{keys:["シュウマイ","焼売"],cal:180},
];

function estimateCal(text) {
  const lower = text.toLowerCase(), results = [], matched = new Set();
  for (const food of FOOD_DB) {
    for (const key of food.keys) {
      if (lower.includes(key.toLowerCase()) && !matched.has(food)) {
        matched.add(food);
        const m = lower.match(new RegExp(`(\\d+)\\s*(?:個|本|杯|枚|皿).*${key}|${key}.*?(\\d+)\\s*(?:個|本|杯|枚|皿)`));
        const qty = m ? parseInt(m[1]||m[2]) : 1;
        results.push({name:food.keys[0], cal:Math.round(food.cal*qty)});
        break;
      }
    }
  }
  if (!results.length) results.push({name:text, cal:400, unknown:true});
  return {items:results, total:results.reduce((s,r)=>s+r.cal,0), unknown:results.some(r=>r.unknown)};
}

function loadData() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY))||{days:{}}; } catch { return {days:{}}; } }
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
function loadGoal() { try { return JSON.parse(localStorage.getItem(GOAL_KEY)); } catch { return null; } }
function persistGoal(g) { localStorage.setItem(GOAL_KEY, JSON.stringify(g)); }
function todayKey() { return new Date().toISOString().slice(0,10); }

let GOAL = null, appData = loadData(), chartInstance = null;

function getToday() { return appData.days[todayKey()]||{meals:[],weight:null}; }
function saveToday(patch) {
  appData.days[todayKey()] = {...getToday(),...patch};
  saveData(appData);
}

function goalDate() { return new Date(GOAL.goalDate+"T00:00:00"); }
function startDate() { return new Date(GOAL.startDate+"T00:00:00"); }
function calcDaysLeft() { return Math.max(0, Math.ceil((goalDate()-new Date())/86400000)); }
function calcIdeal(dateStr) {
  const d = new Date(dateStr+"T00:00:00");
  const ratio = Math.min(1,Math.max(0,(d-startDate())/(goalDate()-startDate())));
  return Math.round((GOAL.startWeight-(GOAL.startWeight-GOAL.goalWeight)*ratio)*10)/10;
}
function getAdvice(cal, weight, dl) {
  const diff = weight-GOAL.goalWeight;
  const target = Math.round(1700-(diff*7700/Math.max(dl,1))*0.5);
  if (cal>2200) return `今日は${cal}kcalと多めでした。目安の${target}kcal前後を意識すると、${GOAL.goalDate.replace(/-/g,"/")}の目標に近づきます。明日は野菜から食べ始めてみましょう。`;
  if (cal>1800) return `今日は${cal}kcalとまずまずのペースです。残り${dl}日、この調子で続ければ目標の${GOAL.goalWeight}kgは届きます。`;
  if (cal>1200) return `今日は${cal}kcalと理想的な範囲です。極端に減らさずこのバランスを保つのが長続きの秘訣です。`;
  return `今日は${cal}kcalと少なめです。急激な制限は続かないので、栄養バランスには気をつけてください。`;
}

function saveSetup() {
  const name = document.getElementById("setupName").value.trim();
  const sw = parseFloat(document.getElementById("setupCurrentWeight").value);
  const gw = parseFloat(document.getElementById("setupGoalWeight").value);
  const gd = document.getElementById("setupGoalDate").value;
  if (!name||isNaN(sw)||isNaN(gw)||!gd) { alert("すべての項目を入力してください"); return; }
  GOAL = {name, startWeight:sw, goalWeight:gw, goalDate:gd, startDate:todayKey()};
  persistGoal(GOAL);
  document.getElementById("setupScreen").style.display="none";
  document.getElementById("mainScreen").style.display="block";
  render();
}

function openGoalEdit() {
  document.getElementById("editGoalWeight").value = GOAL.goalWeight;
  document.getElementById("editGoalDate").value = GOAL.goalDate;
  document.getElementById("goalModal").style.display="flex";
}
function closeModalOutside(e) { if (e.target.id==="goalModal") document.getElementById("goalModal").style.display="none"; }
function saveGoalEdit() {
  const gw = parseFloat(document.getElementById("editGoalWeight").value);
  const gd = document.getElementById("editGoalDate").value;
  if (isNaN(gw)||!gd) return;
  GOAL.goalWeight=gw; GOAL.goalDate=gd;
  persistGoal(GOAL);
  document.getElementById("goalModal").style.display="none";
  render();
}

function render() {
  const today = getToday(), todayStr = todayKey();
  document.getElementById("dateStr").textContent = new Date().toLocaleDateString("ja-JP",{month:"long",day:"numeric",weekday:"short"});

  let streak=0, d=new Date();
  while(true){const k=d.toISOString().slice(0,10);if(appData.days[k]?.weight){streak++;d.setDate(d.getDate()-1);}else break;}
  document.getElementById("streakNum").textContent=streak;

  const dl=calcDaysLeft();
  document.getElementById("daysLeft").innerHTML=`${dl}<span class="days-unit">日</span>`;
  document.getElementById("goalVal").innerHTML=`${GOAL.goalWeight}kg <span class="goal-date-lbl">${GOAL.goalDate.replace(/-/g,".")}</span>`;
  document.getElementById("idealWeight").textContent=`${calcIdeal(todayStr)} kg`;

  const diffEl=document.getElementById("weightDiff");
  if(today.weight){
    const diff=Math.round((today.weight-GOAL.goalWeight)*10)/10;
    diffEl.style.display="block";
    diffEl.innerHTML=`<span style="color:${diff>0?'var(--accent)':'var(--green)'};font-weight:700">${diff>0?"▲":"▼"}${Math.abs(diff)}kg</span> <span style="color:var(--muted)">目標まで</span>`;
  } else diffEl.style.display="none";

  const totalCal=(today.meals||[]).reduce((s,m)=>s+(m.total||0),0);
  document.getElementById("totalCal").textContent=totalCal.toLocaleString();

  document.getElementById("mealInputs").innerHTML=MEAL_LABELS.map(label=>`
    <div class="meal-entry">
      <div class="meal-label-txt">${label}</div>
      <div class="input-row">
        <input class="text-input" id="input-${label}" placeholder="${
          label==="朝食"?"例：バナナ、トースト、コーヒー":
          label==="昼食"?"例：牛丼並盛り、味噌汁":
          label==="夕食"?"例：刺身定食、ご飯少なめ":"例：りんご、チョコ少し"
        }" onkeydown="if(event.key==='Enter')addMeal('${label}')">
        <button class="add-btn" onclick="addMeal('${label}')">追加</button>
      </div>
    </div>`).join("");

  const meals=today.meals||[];
  const ls=document.getElementById("mealListSection");
  if(meals.length){
    ls.style.display="block";
    document.getElementById("mealList").innerHTML=meals.map((m,i)=>`
      <div class="meal-row">
        <div class="meal-row-l">
          <div class="meal-meta"><span class="meal-tag">${m.label}</span><span class="meal-time">${m.timestamp||""}</span></div>
          <div class="meal-txt">${m.text}</div>
          ${m.unknown?'<div class="unknown-note">※未登録食品のため概算400kcalで計上</div>':""}
          <div class="meal-chips">${(m.items||[]).map(it=>`<span class="meal-chip">${it.name} ${it.cal}kcal</span>`).join("")}</div>
        </div>
        <div class="meal-row-r">
          <span class="meal-cal">${m.total}</span><span class="meal-cal-unit">kcal</span>
          <button class="del-btn" onclick="removeMeal(${i})">✕</button>
        </div>
      </div>`).join("");
  } else ls.style.display="none";

  const wl=document.getElementById("weightLogged");
  if(today.weight){wl.style.display="block";wl.textContent=`✓ 本日 ${today.weight}kg を記録済み`;}else wl.style.display="none";

  const ab=document.getElementById("adviceBox");
  if(today.weight&&totalCal>0){ab.style.display="block";document.getElementById("adviceTxt").textContent=getAdvice(totalCal,today.weight,dl);}else ab.style.display="none";

  renderGraph();
}

function renderGraph() {
  const wd=Object.entries(appData.days).filter(([,d])=>d.weight).sort(([a],[b])=>a.localeCompare(b));
  const nd=document.getElementById("noData"),cv=document.getElementById("weightChart");
  if(!wd.length){nd.style.display="block";cv.style.display="none";}
  else {
    nd.style.display="none";cv.style.display="block";
    const labels=[],actual=[],goal=[];
    const start=new Date(wd[0][0]+"T00:00:00"),end=new Date(wd[wd.length-1][0]+"T00:00:00");
    end.setMonth(end.getMonth()+1);
    const cur=new Date(start);
    while(cur<=end){
      const k=cur.toISOString().slice(0,10);
      labels.push(k.slice(5));goal.push(calcIdeal(k));actual.push(appData.days[k]?.weight||null);
      cur.setDate(cur.getDate()+7);
    }
    if(chartInstance)chartInstance.destroy();
    chartInstance=new Chart(cv,{
      type:"line",data:{labels,datasets:[
        {label:"理想ペース",data:goal,borderColor:"#2e7d5e",borderDash:[5,5],borderWidth:1.5,pointRadius:0,tension:0.3},
        {label:"実測",data:actual,borderColor:"#c84b2f",borderWidth:2.5,pointRadius:5,pointBackgroundColor:"#c84b2f",tension:0.3,spanGaps:true},
      ]},
      options:{responsive:true,maintainAspectRatio:true,
        plugins:{legend:{labels:{font:{family:"'Noto Serif JP',serif",size:11},color:"#9a8e80"}}},
        scales:{x:{ticks:{font:{family:"inherit",size:9},color:"#9a8e80"},grid:{color:"#e8e0d5"}},
                y:{ticks:{font:{family:"inherit",size:9},color:"#9a8e80"},grid:{color:"#e8e0d5"}}}}
    });
  }
  const he=document.getElementById("histList");
  if(!wd.length){he.innerHTML="";return;}
  he.innerHTML=[...wd].reverse().slice(0,14).map(([date,d])=>{
    const diff=Math.round((d.weight-GOAL.goalWeight)*10)/10;
    return `<div class="hist-row"><span class="hist-date">${date}</span><span class="hist-w">${d.weight} kg</span><span style="font-size:11px;color:${d.weight<=GOAL.goalWeight?'var(--green)':'var(--muted)'}">${d.weight<=GOAL.goalWeight?"✓ 目標達成!":"あと "+Math.abs(diff)+"kg"}</span></div>`;
  }).join("");
}

function addMeal(label) {
  const inp=document.getElementById(`input-${label}`),text=inp.value.trim();
  if(!text)return;
  saveToday({meals:[...(getToday().meals||[]),{label,text,...estimateCal(text),timestamp:new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"})}]});
  inp.value="";render();
}
function removeMeal(idx){const m=[...(getToday().meals||[])];m.splice(idx,1);saveToday({meals:m});render();}
function logWeight(){
  const v=parseFloat(document.getElementById("weightInput").value);
  if(isNaN(v)||v<30||v>200)return;
  saveToday({weight:v});document.getElementById("weightInput").value="";render();
}
function switchTab(tab){
  document.querySelectorAll(".tab").forEach((el,i)=>el.classList.toggle("active",(i===0&&tab==="today")||(i===1&&tab==="graph")));
  document.getElementById("tab-today").classList.toggle("active",tab==="today");
  document.getElementById("tab-graph").classList.toggle("active",tab==="graph");
  if(tab==="graph")renderGraph();
}

// 起動
GOAL=loadGoal();
if(!GOAL){
  document.getElementById("setupScreen").style.display="block";
  const def=new Date();def.setMonth(def.getMonth()+6);
  document.getElementById("setupGoalDate").value=def.toISOString().slice(0,10);
} else {
  document.getElementById("mainScreen").style.display="block";
  render();
}
</script>
